<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <style>
    .bg   { fill: #1D1D1F; }
    .bone { fill: #FFFFFF; opacity: 0.15; }
    .tendon { fill: none; stroke: #FFFFFF; stroke-width: 6; stroke-linecap: round; }
    .accent { fill: #0066CC; }
    @media (prefers-color-scheme: light) {
      .bg   { fill: #F5F5F7; }
      .tendon { stroke: #1D1D1F; }
      .accent { fill: #0066CC; }
    }
  </style>

  <!-- Fond arrondi -->
  <rect width="128" height="128" rx="28" class="bg"/>

  <!-- Silhouette jambe stylisée — tibia + fémur -->
  <!-- Fémur (os du haut) -->
  <ellipse cx="50" cy="30" rx="10" ry="14" class="bone"/>
  <!-- Tibia (os du bas) -->
  <ellipse cx="78" cy="98" rx="9" ry="13" class="bone"/>

  <!-- Tendon — ligne courbe centrale (le tendon rotulien) -->
  <path d="M 44 46 Q 52 64 56 76 Q 60 88 70 96" class="tendon"/>

  <!-- Point d'inflammation / accent (zone douloureuse sur le tendon) -->
  <circle cx="58" cy="78" r="8" class="accent" opacity="0.9"/>
  <circle cx="58" cy="78" r="4" fill="#FFFFFF" opacity="0.9"/>

  <!-- Rotule stylisée -->
  <ellipse cx="53" cy="64" rx="11" ry="9" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.5"/>
</svg>
